<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fouad EduLab - إنجازاتنا بالأرقام</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="family">
    
    <style>
        :root {
            --bg-color: #0d1b2a;
            --card-bg: #1b263b;
            --primary-color: #00b4d8;
            --text-color: #e0e1dd;
            --accent-color: #00f5d4;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header badge {
            background-color: rgba(0, 245, 212, 0.1);
            color: var(--accent-color);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid var(--accent-color);
        }

        .header h1 {
            font-size: 2.5rem;
            margin: 15px 0;
            color: #fff;
        }

        .header h1 span {
            color: var(--accent-color);
        }

        .header p {
            color: #a984aa;
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1100px;
        }

        .stat-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 30px 20px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            border-color: rgba(0, 245, 212, 0.2);
        }

        .icon-wrapper {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: rgba(0, 180, 216, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: var(--accent-color);
            font-size: 1.5rem;
        }

        .stat-number {
            font-size: 3rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 1rem;
            color: #a0aec0;
            font-weight: 600;
        }

        /* قسم طالب الشهر */
        .featured-student {
            margin-top: 50px;
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            border: 1px solid rgba(0, 245, 212, 0.3);
        }

        .student-badge {
            background-color: #00f5d4;
            color: #0d1b2a;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }

        .student-name {
            font-size: 1.8rem;
            color: #fff;
            margin: 10px 0;
        }

        .student-desc {
            color: #a0aec0;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .loading {
            font-size: 1.2rem;
            color: var(--accent-color);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="header">
        <span class="student-badge" style="background: rgba(0,180,216,0.2); color: var(--primary-color); border: 1px solid var(--primary-color);">Fouad EduLab — Learn • Explore • Innovate 🚀</span>
        <h1>إنجازاتنا معًا <span>بالأرقام</span></h1>
        <p>كل رقم هنا يمثل طالبًا اكتشف شغفه بالعلوم... انضم إلى رحلة التعلم والاستكشاف والإبداع!</p>
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <div class="icon-wrapper">👥</div>
            <div class="stat-number" id="studentsCount">...</div>
            <div class="stat-label">طالب مستفيد</div>
        </div>

        <div class="stat-card">
            <div class="icon-wrapper">📖</div>
            <div class="stat-number" id="lessonsCount">...</div>
            <div class="stat-label">درس تفاعلي</div>
        </div>

        <div class="stat-card">
            <div class="icon-wrapper">🛡️</div>
            <div class="stat-number" id="certificatesCount">...</div>
            <div class="stat-label">شهادة إنجاز صادرة</div>
        </div>

        <div class="stat-card">
            <div class="icon-wrapper">⭐</div>
            <div class="stat-number" id="satisfactionCount">...</div>
            <div class="stat-label">نسبة رضا الطلاب</div>
        </div>
    </div>

    <div class="featured-student">
        <span class="student-badge">⭐ طالب الشهر</span>
        <div id="studentContainer">
            <p class="loading">جاري التحميل...</p>
        </div>
    </div>

    <script>
        // رابط جلب البيانات بصيغة CSV الخاص بجدولك المحدث
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQKN1gyUkoaLaxze82yAVP3wsRvVgItcpnYd8tlFINPkjdy3YsYoa155G6JdTH2IMWJZyRSCvbmo3S/pub?output=csv';

        async function fetchStats() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                
                // تحويل بيانات CSV إلى مصفوفة أسطر
                const rows = data.split('\n').map(row => row.split(','));
                
                // تحويل البيانات إلى كائن مفتاح وقيمة (Key-Value)
                const stats = {};
                rows.forEach(row => {
                    if (row[0] && row[1]) {
                        const key = row[0].trim();
                        const value = row[1].trim().replace(/\r/g, ''); // إزالة أي مسافات مخفية
                        stats[key] = value;
                    }
                });

                // 1. تحديث العدادات الرقمية مع الأنيميشن السلس
                animateNumber('studentsCount', parseInt(stats['students']) || 0, '');
                animateNumber('lessonsCount', parseInt(stats['lessons']) || 0, '+');
                animateNumber('certificatesCount', parseInt(stats['certificates']) || 0, '+');
                animateNumber('satisfactionCount', parseInt(stats['satisfaction']) || 0, '%');

                // 2. تحديث بيانات طالب الشهر المتميز
                const studentName = stats['student_name'] || 'طالب متميز';
                const studentDesc = stats['student_desc'] || 'تفوق واجتهاد مستمر في المختبر العلمي.';
                
                document.getElementById('studentContainer').innerHTML = `
                    <div class="student-name">${studentName}</div>
                    <p class="student-desc">${studentDesc}</p>
                `;

            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('studentContainer').innerHTML = `<p style="color: red;">عذرًا، تعذر تحميل بيانات طالب الشهر حاليًا.</p>`;
            }
        }

        // دالة الأنيميشن لزيادة الأرقام تدريجيًا من الصفر
        function animateNumber(elementId, targetValue, suffix) {
            const element = document.getElementById(elementId);
            let startValue = 0;
            const duration = 1500; // مدة الحركة بالملي ثانية (1.5 ثانية)
            const startTime = performance.now();

            function update(currentTime) {
                const elapsedTime = currentTime - startTime;
                if (elapsedTime >= duration) {
                    element.textContent = targetValue + suffix;
                } else {
                    const progress = elapsedTime / duration;
                    // تأثير زيادة تسارعية خفيفة
                    const currentValue = Math.floor(progress * targetValue);
                    element.textContent = currentValue + suffix;
                    requestAnimationFrame(update);
                }
            }
            requestAnimationFrame(update);
        }

        // تشغيل الدالة فور تحميل الصفحة
        window.addEventListener('DOMContentLoaded', fetchStats);
    </script>
</body>
</html>
