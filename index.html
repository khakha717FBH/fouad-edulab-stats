<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fouad EduLab - إنجازاتنا بالأرقام</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0d1b2a;
            --card-bg: #1b263b;
            --primary-color: #00b4d8;
            --text-color: #e0e1dd;
            --accent-color: #00f5d4;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        .header h1 {
            font-size: 2rem;
            margin: 10px 0;
            color: #fff;
        }

        .header h1 span {
            color: var(--accent-color);
        }

        .header p {
            color: #a0aec0;
            font-size: 0.95rem;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.5;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* جعلها شبكة 2x2 بشكل افتراضي شاشات المحمول */
            gap: 15px;
            width: 100%;
            max-width: 1100px;
            padding: 0 10px;
            box-sizing: border-box;
        }

        @media (min-width: 768px) {
            .stats-container {
                grid-template-columns: repeat(4, 1fr); /* العودة لأربعة بجانب بعضها على الكمبيوتر */
                gap: 25px;
            }
            .header h1 {
                font-size: 2.5rem;
            }
            .header p {
                font-size: 1.1rem;
            }
        }

        .stat-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px 10px;
            text-align: center;
            transition: transform 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .icon-wrapper {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: rgba(0, 180, 216, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            color: var(--accent-color);
            font-size: 1.2rem;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
        }

        @media (min-width: 768px) {
            .stat-number {
                font-size: 3rem;
            }
            .icon-wrapper {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
            }
            .stat-card {
                padding: 30px 20px;
            }
        }

        .stat-label {
            font-size: 0.85rem;
            color: #a0aec0;
            font-weight: 600;
        }

        @media (min-width: 768px) {
            .stat-label {
                font-size: 1rem;
            }
        }

        .featured-student {
            margin-top: 30px;
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            width: calc(100% - 20px);
            max-width: 600px;
            text-align: center;
            border: 1px solid rgba(0, 245, 212, 0.2);
            box-sizing: border-box;
        }

        .student-badge {
            background-color: #00f5d4;
            color: #0d1b2a;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }

        .student-name {
            font-size: 1.5rem;
            color: #fff;
            margin: 5px 0;
        }

        .student-desc {
            color: #a0aec0;
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 5px 0 0 0;
        }

        .loading {
            font-size: 1rem;
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>إنجازاتنا معًا <span>بالأرقام</span></h1>
        <p>كل رقم هنا يمثل طالبًا اكتشف شغفه بالعلوم في منصة Fouad EduLab.</p>
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <div class="icon-wrapper">👥</div>
            <div class="stat-number" id="studentsCount">...</div>
            <div class="stat-label">طالب مستفيد</div>
        </div>

        <div class="stat-card">
            <div class="icon-wrapper">📖</div>
            <div class="stat-number" id="lessonsCount">...</div>
            <div class="stat-label">درس تفاعلي</div>
        </div>

        <div class="stat-card">
            <div class="icon-wrapper">🛡️</div>
            <div class="stat-number" id="certificatesCount">...</div>
            <div class="stat-label">شهادة صادرة</div>
        </div>

        <div class="stat-card">
            <div class="icon-wrapper">⭐</div>
            <div class="stat-number" id="satisfactionCount">...</div>
            <div class="stat-label">نسبة رضا الطلاب</div>
        </div>
    </div>

    <div class="featured-student">
        <span class="student-badge">⭐ طالب الشهر</span>
        <div id="studentContainer">
            <p class="loading">جاري التحميل...</p>
        </div>
    </div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQKN1gyUkoaLaxze82yAVP3wsRvVgItcpnYd8tlFINPkjdy3YsYoa155G6JdTH2IMWJZyRSCvbmo3S/pub?output=csv';

        async function fetchStats() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                
                const lines = data.split('\n');
                const stats = {};

                lines.forEach(line => {
                    let row = line.includes(';') ? line.split(';') : line.split(',');
                    if (row[0] && row[1]) {
                        const key = row[0].trim().replace(/["']/g, '');
                        const value = row[1].trim().replace(/["']/g, '').replace(/\r/g, '');
                        stats[key] = value;
                    }
                });

                animateNumber('studentsCount', parseInt(stats['students']) || 0, '');
                animateNumber('lessonsCount', parseInt(stats['lessons']) || 0, '+');
                animateNumber('certificatesCount', parseInt(stats['certificates']) || 0, '+');
                animateNumber('satisfactionCount', parseInt(stats['satisfaction']) || 0, '%');

                const studentName = stats['student_name'] || 'طالب متميز';
                const studentDesc = stats['student_desc'] || 'تفوق واجتهاد مستمر في المختبر العلمي.';
                
                document.getElementById('studentContainer').innerHTML = `
                    <div class="student-name">${studentName}</div>
                    <p class="student-desc">${studentDesc}</p>
                `;

            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('studentContainer').innerHTML = `<p style="color: red; font-size:0.9rem;">تعذر تحميل بيانات طالب الشهر حاليًا.</p>`;
            }
        }

        function animateNumber(elementId, targetValue, suffix) {
            const element = document.getElementById(elementId);
            let startValue = 0;
            const duration = 1200;
            const startTime = performance.now();

            function update(currentTime) {
                const elapsedTime = currentTime - startTime;
                if (elapsedTime >= duration) {
                    element.textContent = targetValue + suffix;
                } else {
                    const progress = elapsedTime / duration;
                    const currentValue = Math.floor(progress * targetValue);
                    element.textContent = currentValue + suffix;
                    requestAnimationFrame(update);
                }
            }
            requestAnimationFrame(update);
        }

        window.addEventListener('DOMContentLoaded', fetchStats);
    </script>
</body>
</html>
